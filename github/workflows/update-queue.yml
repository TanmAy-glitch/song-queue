name: Update Song Queue

on:
  issues:
    types: [opened]

jobs:
  update-queue:
    if: contains(github.event.issue.labels.*.name, 'song-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and append to queue.txt
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/parse_issue.py

      - name: Commit queue.txt
        run: |
          git config user.name "song-queue-bot"
          git config user.email "actions@github.com"
          git add queue.txt
          git commit -m "Add song request from issue #${{ github.event.issue.number }}" || echo "nothing to commit"
          git push

      - name: Close issue with a thank-you
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Added to the queue."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });
